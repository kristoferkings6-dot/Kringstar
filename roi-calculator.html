        .input-group {

        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #E8E8E8;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;

        .input-group input:focus {

        .calculate-btn {

        .calculate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);

            to {
                opacity: 1;
                transform: translateY(0);

        .score-circle {
            width: 200px;

            border-radius: 50%;

            align-items: center;
            justify-content: center;

        .score-circle.bad {

            text-align: center;

            margin-bottom: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            background: rgba(0, 102, 255, 0.1);
            border: 2px solid rgba(0, 102, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            color: #A0A0A0;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #0066FF;
            font-size: 2rem;
            font-weight: 700;
        }

        .money-leak {
            background: linear-gradient(135deg, #FF6B6B, #C92A2A);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            text-align: center;
        }

        .money-leak h3 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .money-leak p {
            font-size: 1.2rem;

        .problems-list {

        .problem-item {

        .cta-box {

            text-align: center;

        }

        .cta-box h3 {

            margin-bottom: 20px;
        }

        .cta-box p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 15px 30px;
            background: white;
            color: #0066FF;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.3);
        }

        .cta-btn.secondary {
            background: transparent;
            border: 2px solid white;
            color: white;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 25px;
            }

            .score-circle {
                width: 150px;
                height: 150px;
                font-size: 3rem;
            }

            .cta-buttons {
                flex-direction: column;
            }
        }

        .progress-bar {
            height: 8px;
            background: rgba(0, 102, 255, 0.2);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0066FF, #FFD700);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Free Lead Gen ROI Calculator</h1>

        </div>

        <div class="card">
            <div class="progress-bar">

            <form id="calculatorForm">
                <!-- Question 1 -->
                <div class="question">

                    <label>How much do you spend monthly on lead generation?</label>
                    <div class="options">

                            ₦0-₦100K
                        </label>
                        <label class="option">
                            <input type="radio" name="q1" value="200">
                            ₦100K-₦300K
                        </label>
                        <label class="option">
                            <input type="radio" name="q1" value="400">
                            ₦300K-₦500K
                        </label>
                        <label class="option">
                            <input type="radio" name="q1" value="600">

                <!-- Question 2 -->
                <div class="question">

                <!-- Question 3 -->

                    <label>How many of those leads do you actually speak to?</label>
                    <div class="options">
                        <label class="option">
                            <input type="radio" name="q3" value="10" required>

                <!-- Question 4 -->
                <div class="question">

                        </label>
                        <label class="option">
                            <input type="radio" name="q4" value="8">
                            5-10
                        </label>
                        <label class="option">
                            <input type="radio" name="q4" value="15">
                            10-20
                        </label>
                        <label class="option">
                            <input type="radio" name="q4" value="25">
                            20+
                        </label>
                    </div>
                </div>

                <!-- Question 5 -->
                <div class="question">
                    <div class="question-number">QUESTION 5 OF 8</div>
                    <label>What's your appointment show-up rate?</label>
                    <div class="options">
                        <label class="option">
                            <input type="radio" name="q5" value="15" required>
                            Less than 20%
                        </label>
                        <label class="option">
                            <input type="radio" name="q5" value="30">

                        </label>
                        <label class="option">

                <!-- Question 6 -->
                <div class="question">

                    <label>How many deals do you close per month?</label>
                    <div class="options">
                        <label class="option">
                            <input type="radio" name="q6" value="1" required>

                <!-- Question 7 -->
                <div class="question">
                    <div class="question-number">QUESTION 7 OF 8</div>
                    <label>What's your average commission per deal?</label>
                    <div class="options">
                        <label class="option">
                            <input type="radio" name="q7" value="750" required>

                    </div>

        </div>

        <!-- Results Section -->
        <div id="results" class="results"></div>

    <script>
        // Handle option selection visual feedback
        document.querySelectorAll('.option').forEach(option => {
            option.addEventListener('click', function() {
                const radio = this.querySelector('input[type="radio"]');
                const name = radio.name;
                
                // Remove selected class from all options in this question
                document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                    r.closest('.option').classList.remove('selected');
                });
                
                // Add selected class to clicked option
                this.classList.add('selected');
                radio.checked = true;
                
                // Update progress
                updateProgress();
            });
        });

        // Update progress bar
        function updateProgress() {
            const totalQuestions = 8;
            let answered = 0;
            
            for (let i = 1; i <= totalQuestions; i++) {
                if (document.querySelector(`input[name="q${i}"]:checked`)) {
                    answered++;
                }
            }
            
            const progress = (answered / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Handle form submission
        document.getElementById('calculatorForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Calculate score
            const score = calculateScore(data);
            
            // Show results
            displayResults(score, data);
            
            // Send to Make.com webhook
            try {
                await fetch('https://hook.us2.make.com/sct5yoiul5gcdkoagdrrviyqwrqw7n2v',{
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...data,
                        score: score,
                        timestamp: new Date().toISOString(),
                        source: 'ROI Calculator'
                    })
                });
            } catch (error) {
                console.error('Error sending data:', error);
            }
            
            // Scroll to results
            setTimeout(() => {
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        });

        function calculateScore(data) {
            const q1 = parseInt(data.q1);
            const q2 = parseInt(data.q2);
            const q3 = parseInt(data.q3);
            const q4 = parseInt(data.q4);
            const q5 = parseInt(data.q5);
            const q6 = parseInt(data.q6);
            const q7 = parseInt(data.q7);
            const q8 = parseInt(data.q8);
            
            // Weighted scoring system
            let score = 0;
            
            // More leads = better (but capped)
            score += Math.min(q2, 50);
            
            // Better contact rate = better
            score += q3 * 0.5;
            
            // More appointments = better
            score += q4 * 2;
            
            // Higher show rate = much better
            score += q5;
            
            // More deals = better
            score += q6 * 10;
            
            // Less time wasted = better (inverse)
            score += Math.max(0, 30 - q8);
            
            // Normalize to 0-100
            return Math.min(100, Math.round(score));
        }

        function displayResults(score, data) {
            const q1 = parseInt(data.q1);
            const q2 = parseInt(data.q2);
            const q6 = parseInt(data.q6);
            const q7 = parseInt(data.q7);
            const q8 = parseInt(data.q8);
            
            const currentRevenue = q6 * q7;
            const potentialRevenue = currentRevenue * 3;
            const moneyLeak = potentialRevenue - currentRevenue;
            const timeWasted = q8 * 4; // monthly hours
            
            let scoreClass = 'bad';
            let zoneLabel = '⚠️ Money Leak Zone';
            let zoneSublabel = 'Your system is bleeding cash';
            
            if (score >= 70) {
                scoreClass = 'good';
                zoneLabel = '✅ Optimized Zone';
                zoneSublabel = 'You\'re doing well!';
            } else if (score >= 40) {
                scoreClass = 'medium';
                zoneLabel = '⚡ Improvement Zone';
                zoneSublabel = 'Room for growth';
            }
            
            const resultsHTML = `
                <div class="card">
                    <h2 style="text-align: center; font-size: 2rem; margin-bottom: 20px;">Your Lead Gen ROI Score</h2>
                    
                    <div class="score-circle ${scoreClass}">
                        ${score}<span style="font-size: 2rem;">/100</span>
                    </div>
                    
                    <div class="zone-label">${zoneLabel}</div>
                    <div class="zone-sublabel">${zoneSublabel}</div>
                    
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">Monthly Spend</div>
                            <div class="stat-value">₦${q1}K</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Deals Closed</div>
                            <div class="stat-value">${q6}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Current Revenue</div>
                            <div class="stat-value">₦${(currentRevenue/1000).toFixed(1)}M</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Hours Wasted</div>
                            <div class="stat-value">${timeWasted}h</div>
                        </div>
                    </div>
                    
                    <div class="money-leak">
                        <h3>💸 ₦${(moneyLeak/1000).toFixed(1)}M Money Leak Detected</h3>
                        <p>You're leaving this much on the table every month</p>
                    </div>
                    
                    <div class="problems-list">
                        <h3 style="margin-bottom: 20px; color: #FF6B6B;">🔍 What's Causing Your Money Leak:</h3>
                        
                        ${score < 70 ? `
                        <div class="problem-item">
                            <h4>Problem #1: Low Qualification Rate</h4>
                            <p>70% of your leads are time-wasters. You need a pre-qualification system before they hit your calendar.</p>
                        </div>
                        ` : ''}
                        
                        ${score < 50 ? `
                        <div class="problem-item">
                            <h4>Problem #2: Poor Show Rate</h4>
                            <p>Only 20-30% of appointments show up. You need automated WhatsApp reminders and confirmation systems.</p>
                        </div>
                        ` : ''}
                        
                        ${q8 > 10 ? `
                        <div class="problem-item">
                            <h4>Problem #3: Too Much Time Wasting</h4>
                            <p>You're spending ${q8} hours/week on lead gen. That's ${timeWasted} hours/month you could spend closing deals.</p>
                        </div>
                        ` : ''}
                    </div>
                    
                    <div style="background: rgba(0, 102, 255, 0.1); padding: 30px; border-radius: 15px; margin: 30px 0;">
                        <h3 style="margin-bottom: 20px; color: #0066FF;">🎯 Your Potential with an Optimized System:</h3>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-label">Monthly Spend</div>
                                <div class="stat-value" style="color: #51CF66;">₦700K</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Deals Closed</div>
                                <div class="stat-value" style="color: #51CF66;">3-4</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Potential Revenue</div>
                                <div class="stat-value" style="color: #51CF66;">₦${(potentialRevenue/1000).toFixed(1)}M</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Hours Saved</div>
                                <div class="stat-value" style="color: #51CF66;">${timeWasted}h</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="cta-box">
                    <h3>🚀 Want Us to Fix This For You?</h3>
                    <p>We've helped 50+ Nigerian agents go from ₦0-₦2M/month to ₦5M-₦15M/month using our AI-powered appointment setting system.</p>
                    <p style="font-size: 1.3rem; font-weight: 700;">⚡ The Performance Pilot: ZERO RISK</p>
                    <p>Pay only ₦40K per appointment that shows up. We cover the ad spend. If we book 0, you pay ₦0.</p>
                    <div class="cta-buttons">
                        <a href="https://wa.me/2349037668075?text=Hi%2C%20I%20just%20took%20the%20ROI%20Calculator%20and%20got%20a%20score%20of%20${score}.%20I%20want%20to%20learn%20more%20about%20fixing%20my%20lead%20gen." class="cta-btn">
                            📱 WhatsApp Us Now
                        </a>
                        <a href="https://kringstarltd.github.io/Web/" class="cta-btn secondary">
                            📊 View Full Details
                        </a>
                    </div>
                </div>
            `;
            
            document.getElementById('results').innerHTML = resultsHTML;
            document.getElementById('results').classList.add('show');
        }
    </script>
</body>
